name: Sync Medium to Writing page

# Runs the build script that pulls your Medium RSS into index.html.
on:
  schedule:
    - cron: "0 */6 * * *"      # every 6 hours
  workflow_dispatch:            # lets you run it manually from the Actions tab
  push:
    branches: [ main ]
    paths: [ "build-blog.js" ]  # re-run when the script itself changes

permissions:
  contents: write               # needed to commit the regenerated index.html

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Regenerate Writing cards from Medium
        run: node build-blog.js

      - name: Commit changes if any
        run: |
          if [ -n "$(git status --porcelain index.html)" ]; then
            git config user.name "medium-sync-bot"
            git config user.email "actions@users.noreply.github.com"
            git add index.html
            git commit -m "Sync Writing page with Medium"
            git push
          else
            echo "No changes to commit."
          fi
